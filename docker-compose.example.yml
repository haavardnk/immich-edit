services:
  immich-edit:
    image: immich-edit:local
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - edit-cache:/cache
    restart: unless-stopped

    # --- AMD GPU (uncomment) ---
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render
    #   # On Unraid or distros without a `render` group, replace the names
    #   # above with the numeric GID of the host group owning /dev/dri/renderD128
    #   # (find it with: stat -c '%g' /dev/dri/renderD128), e.g. "18".

    # --- Intel GPU (uncomment) ---
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render
    #   # Same Unraid note as above applies.

    # --- NVIDIA GPU (uncomment) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  edit-cache:
