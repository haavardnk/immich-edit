services:
  immich-edit:
    image: immich-edit:local
    build: .
    ports:
      - "3000:3000"
    environment:
      - IMMICH_URL=http://immich-server:2283
      - IMMICH_API_KEY=your-api-key-here
      - IMMICH_EDIT_RENDERER=auto
      # set AUTH_TOKEN for LAN deployments without reverse-proxy auth
      # - AUTH_TOKEN=change-me
    volumes:
      - edit-cache:/cache
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false

    # --- AMD GPU (uncomment) ---
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render

    # --- Intel GPU (uncomment) ---
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render

    # --- NVIDIA GPU (uncomment) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  edit-cache:
