# immich-edit configuration
# All values can also be set via environment variables with the same name (uppercase).

# Immich server URL (required)
# IMMICH_URL = "http://localhost:2283"

# Immich API key (required)
# IMMICH_API_KEY = "your-api-key"

# Address to bind the server to
# BIND_ADDR = "0.0.0.0:3000"

# Directory for caches and database
# CACHE_DIR = "./cache"

# Max edge for preview images
# PREVIEW_MAX_EDGE = 2048

# Max concurrent render tasks
# RENDER_MAX_CONCURRENCY = 2

# Renderer selection: auto, cpu, gpu
# IMMICH_EDIT_RENDERER = "auto"

# SQLite database URL (defaults to CACHE_DIR/immich-edit.db)
# DATABASE_URL = "sqlite://./cache/immich-edit.db?mode=rwc"
